<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="820" viewBox="0 0 1400 820" role="img" aria-labelledby="title desc">
  <title id="title">暮幕壁垒基地预案</title>
  <desc id="desc">20级以上小队固定基地的分层警戒、免费低价施法材料工坊、实体反魔法缓冲、接收缓冲、战术中枢、寝室内的安全室、档案室、复原库、升华同调室和撤离节点示意图。</desc>
  <style>
    .bg { fill: #f5f2e8; }
    .line { fill: none; stroke: #34495e; stroke-width: 4; }
    .thin { fill: none; stroke: #607d8b; stroke-width: 2; stroke-dasharray: 8 7; }
    .zone { stroke: #243746; stroke-width: 3; }
    .label { font-family: Arial, 'Noto Sans CJK SC', sans-serif; fill: #17212b; font-size: 22px; }
    .small { font-family: Arial, 'Noto Sans CJK SC', sans-serif; fill: #253746; font-size: 17px; }
    .title { font-family: Arial, 'Noto Sans CJK SC', sans-serif; fill: #17212b; font-size: 34px; font-weight: 700; }
    .subtitle { font-family: Arial, 'Noto Sans CJK SC', sans-serif; fill: #405868; font-size: 18px; }
    .note { font-family: Arial, 'Noto Sans CJK SC', sans-serif; fill: #405868; font-size: 16px; }
    .arrow { fill: none; stroke: #a33a2b; stroke-width: 4; marker-end: url(#arrowhead); }
  </style>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#a33a2b"/>
    </marker>
  </defs>
  <rect class="bg" width="1400" height="820"/>
  <text class="title" x="70" y="62">暮幕壁垒 / The Veiled Redoubt</text>
  <text class="subtitle" x="70" y="94">固定基地建设草案：发现 - 符文与实体缓冲 - 撤离 - 升华。全部布置需 DM 确认。</text>

  <rect x="70" y="145" width="930" height="590" rx="8" fill="#dfe9dc" class="zone"/>
  <text class="label" x="95" y="180">A. 外环 / Outer Ring</text>
  <text class="small" x="95" y="207">哨点、警报术、魔法嘴、巡逻</text>
  <path class="thin" d="M130 270 H940 V670 H130 Z"/>

  <rect x="145" y="290" width="205" height="225" rx="6" fill="#f7d8a2" class="zone"/>
  <text class="label" x="166" y="330">B. 接收缓冲</text>
  <text class="small" x="166" y="357">Arrival Buffer</text>
  <text class="small" x="166" y="390">传送接收</text>
  <text class="small" x="166" y="416">访客识别</text>
  <text class="small" x="166" y="442">战利品隔离</text>
  <text class="small" x="166" y="468">实体折角间距 ≥25尺</text>
  <text class="small" x="166" y="494">主门不直通内层</text>

  <rect x="425" y="265" width="290" height="270" rx="6" fill="#b7d7e8" class="zone"/>
  <text class="label" x="454" y="310">C. 战术中枢</text>
  <text class="small" x="454" y="338">Tactical Hub</text>
  <text class="small" x="454" y="374">集结、通讯、情报图</text>
  <text class="small" x="454" y="401">分配戒指与耗材</text>
  <text class="small" x="454" y="428">确认反击或撤离</text>

  <rect x="780" y="230" width="165" height="170" rx="6" fill="#d5c7e8" class="zone"/>
  <text class="label" x="800" y="272">D. 寝室</text>
  <text class="small" x="800" y="300">Private</text>
  <text class="small" x="800" y="324">Quarters</text>
  <rect x="800" y="340" width="125" height="40" rx="3" fill="#e6c0bf" class="zone"/>
  <text class="small" x="808" y="365">J. 安全室 / Safe</text>

  <rect x="780" y="480" width="165" height="170" rx="6" fill="#c7ded1" class="zone"/>
  <text class="label" x="800" y="522">E. 档案室</text>
  <text class="small" x="800" y="550">Archive &amp; Lab</text>
  <text class="small" x="800" y="580">分卷法术书</text>
  <text class="small" x="800" y="608">研究与鉴定</text>

  <rect x="1080" y="215" width="245" height="165" rx="6" fill="#e6c0bf" class="zone"/>
  <text class="label" x="1103" y="257">F. 复原库</text>
  <text class="small" x="1103" y="285">Recovery Vault</text>
  <text class="small" x="1103" y="317">克隆容器与高价值耗材</text>
  <text class="small" x="1103" y="347">与主建筑物理分离</text>

  <rect x="1080" y="445" width="245" height="155" rx="6" fill="#f0df9f" class="zone"/>
  <text class="label" x="1103" y="487">H. 符文工坊</text>
  <text class="small" x="1103" y="515">Warding Foundry</text>
  <text class="small" x="1103" y="547">低价免费材料</text>
  <text class="small" x="1103" y="574">按分区重置符文</text>

  <rect x="1080" y="650" width="245" height="80" rx="6" fill="#d5c7e8" class="zone"/>
  <text class="label" x="1103" y="683">I. 升华同调</text>
  <text class="small" x="1103" y="710">Ascension &amp; Attunement</text>

  <circle cx="182" cy="620" r="38" fill="#f3b6a6" class="zone"/>
  <text class="label" x="163" y="628">G1</text>
  <text class="small" x="100" y="684">撤离节点 / Egress</text>
  <circle cx="697" cy="665" r="38" fill="#f3b6a6" class="zone"/>
  <text class="label" x="678" y="673">G2</text>

  <path class="line" d="M350 403 H425"/>
  <path class="line" d="M715 400 H780"/>
  <path class="line" d="M715 510 H780"/>
  <path class="line" d="M182 582 V516 H245"/>
  <path class="line" d="M697 627 V535"/>
  <path class="arrow" d="M49 403 H128"/>
  <text class="note" x="32" y="374">外来者</text>
  <text class="note" x="25" y="395">Intruder</text>
  <path class="thin" d="M945 298 H1080"/>
  <path class="thin" d="M945 555 H1080"/>
  <path class="thin" d="M1202 600 V650"/>
  <text class="note" x="1040" y="185">独立位置</text>
  <text class="note" x="1040" y="205">separate site</text>

  <rect x="70" y="765" width="1255" height="1" fill="#7f8c8d"/>
  <text class="note" x="70" y="796">注意：J 安全室与 G2 构成不依赖魔法的内层撤离；单件不高于 500 gp 的材料免费，但不能绕过施法时间、法术位、地点限制或反魔法。</text>
</svg>
